<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOKEPON</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <section id="seleccionar-mascota">
    
        <h1 class="titulo"> MOKEPON! 💧🌱🔥</h1>

        <h2 class="subtitulo">Elige tu mascota:</h2>

        <div id="contenedorTarjetas" class="tarjetas">

        </div>

        <button id="boton-mascota">Seleccionar</button>
    </section>


    <section id="seleccionar-ataque">
        <h1 class="titulo"> MOKEPON! 💧🌱🔥</h1>

        <h2 class="subtitulo">Elige tu ataque:</h2>

        <div id='contenedorAtaques' class="botones-de-ataques">
            <!-- <button id="boton-agua" class="boton-ataque">Agua💧</button>
            <button id="boton-tierra" class="boton-ataque">Tierra🌱</button>            
            <button id="boton-fuego" class="boton-ataque">Fuego🔥</button>             -->
        </div>

        

        <div id="mensajes">
           <p id="resultado">
                Buena suerte 😊
            </p>
                
            <section id="reiniciar">
                <button id="boton-reiniciar">Reiniciar</button>
            </section>
        </div>        

        <div class="ataques">
            <div class="tarjeta-jugador">
                <span id="vidas-jugador">3</span>
                <span id="mascota-jugador"></span>
                <div id="ataques-del-jugador"></div>
            </div>

            <div class="tarjeta-enemigo">
                <span id="vidas-enemigo">3</span>
                <span id="mascota-enemigo"></span>
                <div id="ataques-del-enemigo"></div>
            </div>           
        </div>


    </section>
    
    <script src="./js/javascript.js"></script>

</body>
</html>
